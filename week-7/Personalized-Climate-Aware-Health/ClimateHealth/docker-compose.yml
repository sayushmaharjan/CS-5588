version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: climate_health_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: climate_health_db
      MYSQL_USER: climate_user
      MYSQL_PASSWORD: climate_pass
    ports:
      - "3306:3306"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: climate_health_app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      MYSQL_URL: jdbc:mysql://db:3306/climate_health_db?useSSL=false&allowPublicKeyRetrieval=true
      MYSQL_USER: climate_user
      MYSQL_PASSWORD: climate_pass
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
